services:
  memegen:
    image: ghcr.io/tenequm/runtipi-appstore/memegen:1.1.0
    environment:
      - TZ=${TZ}
      # Tells memegen its public hostname so generated meme URLs (and /docs) are
      # absolute https://<host>/... instead of http://localhost:5000/... . runtipi
      # sets APP_EXPOSED_DOMAIN when the app is exposed; memegen keys off DOMAIN
      # presence to switch to its production https scheme.
      - DOMAIN=${APP_EXPOSED_DOMAIN}
    volumes:
      - ${APP_DATA_DIR}/data/images:/opt/memegen/images
    healthcheck:
      test: python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/docs').status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
    x-runtipi:
      internal_port: 5000
      is_main: true
x-runtipi:
  schema_version: 2
