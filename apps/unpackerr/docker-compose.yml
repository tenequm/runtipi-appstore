services:
  unpackerr:
    image: ghcr.io/hotio/unpackerr:release-0.14.5
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - ${ROOT_FOLDER_HOST}/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ}
      - UN_WEBSERVER_METRICS=true
      - UN_WEBSERVER_LISTEN_ADDR=0.0.0.0:5656
      - UN_INTERVAL=2m
      - UN_START_DELAY=1m
      - UN_SONARR_0_URL=${SONARR_URL}
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_SONARR_0_PATHS_0=/media/torrents
      - UN_RADARR_0_URL=${RADARR_URL}
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_RADARR_0_PATHS_0=/media/torrents
      - UN_LIDARR_0_URL=${LIDARR_URL}
      - UN_LIDARR_0_API_KEY=${LIDARR_API_KEY}
      - UN_LIDARR_0_PATHS_0=/media/torrents
      - UN_READARR_0_URL=${READARR_URL}
      - UN_READARR_0_API_KEY=${READARR_API_KEY}
      - UN_READARR_0_PATHS_0=/media/torrents
    x-runtipi:
      internal_port: 5656
      is_main: true
x-runtipi:
  schema_version: 2
