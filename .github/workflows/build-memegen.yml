name: Build Memegen image

# Builds a custom memegen image from upstream source with all ~200 built-in
# templates PLUS our extra trending templates (images/memegen/extra-templates)
# baked in, and pushes a linux/amd64 image to GHCR.
#
# Upstream publishes no public image, so we build from a pinned source commit.
# Bump MEMEGEN_REF to track upstream; bump VERSION (and apps/memegen images tag)
# on every release.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Only things that change image CONTENT - not scripts/README, which would
      # trigger pointless no-op rebuilds.
      - "images/memegen/extra-templates/**"
      - "images/memegen/patches/**"
      - ".github/workflows/build-memegen.yml"

concurrency:
  group: build-memegen
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/memegen
  VERSION: "1.3.0"
  # Pinned jacebrowning/memegen commit (2026-06-16). Bump to track upstream.
  MEMEGEN_REF: 6e559ceda8bf43caa81072be2d9885adac693f94

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app store
        uses: actions/checkout@v6

      - name: Validate extra-template configs
        # Fail fast before the build: a malformed config.yml is baked into the
        # image and crashes memegen's /templates endpoint at runtime (memegen
        # deletes the bad YAML, then 500s re-reading it). Catch it here instead.
        run: |
          python3 -m pip install --quiet "ruamel.yaml"
          python3 - <<'PY'
          import glob, sys
          from ruamel.yaml import YAML
          from ruamel.yaml.error import YAMLError

          yaml = YAML(typ="safe")
          configs = sorted(glob.glob("images/memegen/extra-templates/*/config.yml"))
          errors = []

          for path in configs:
              try:
                  with open(path) as fh:
                      data = yaml.load(fh)
              except YAMLError as exc:
                  errors.append(f"{path}: invalid YAML - {str(exc).splitlines()[0]}")
                  continue
              if not isinstance(data, dict):
                  errors.append(f"{path}: top-level must be a mapping")
                  continue
              if not isinstance(data.get("name"), str) or not data["name"].strip():
                  errors.append(f"{path}: missing/empty 'name'")
              for key in ("example", "text", "keywords"):
                  if key in data and not isinstance(data[key], list):
                      errors.append(f"{path}: '{key}' must be a list")
              ex = data.get("example")
              if isinstance(ex, list) and not all(isinstance(i, str) for i in ex):
                  errors.append(f"{path}: 'example' items must all be strings")

          print(f"Validated {len(configs)} extra-template configs")
          if errors:
              print(f"\n{len(errors)} invalid config(s):")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print("All configs valid")
          PY

      - name: Checkout memegen source
        uses: actions/checkout@v6
        with:
          repository: jacebrowning/memegen
          ref: ${{ env.MEMEGEN_REF }}
          path: memegen-src

      - name: Apply memegen patches
        # 0001: MP4 animated source/output support.
        # 0002: make watermark settings env-driven so runtipi (docker-compose)
        #       can override them - e.g. DEFAULT_WATERMARK= removes the stamp.
        run: |
          for p in "$GITHUB_WORKSPACE"/images/memegen/patches/*.patch; do
            git -C memegen-src apply --verbose "$p"
            echo "Applied $(basename "$p")"
          done

      - name: Bake in extra templates
        run: |
          cp -r images/memegen/extra-templates/. memegen-src/templates/
          rm -f memegen-src/templates/INDEX.md
          echo "Template count: $(find memegen-src/templates -maxdepth 1 -mindepth 1 -type d | wc -l)"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: memegen-src
          file: memegen-src/Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=memegen with built-in + extra trending templates
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
